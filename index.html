<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailMix - Verified Trails</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* Force the map to fill the container, ensuring it renders even if Flexbox is delayed */
        #map { height: 100vh; width: 100%; }
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        .sidebar { height: 100vh; overflow-y: auto; }
    </style>
</head>
<body class="flex flex-row bg-gray-900 text-white">

    <aside class="w-[350px] bg-[#111827] border-r border-gray-700 p-4 flex flex-col z-20 sidebar">
        <h1 class="text-xl font-bold mb-4 text-emerald-400">TrailMix</h1>
        <div class="flex gap-2 mb-4">
            <input id="search-input" type="text" value="Kotor" class="bg-gray-800 text-white border border-gray-700 rounded px-3 py-2 text-sm w-full">
            <button id="search-btn" class="bg-emerald-700 hover:bg-emerald-600 px-4 py-2 rounded text-sm font-bold">Go</button>
        </div>
        <div id="results" class="space-y-2">
            <p class="text-gray-400 text-sm italic">Enter a location to find trails.</p>
        </div>
    </aside>

    <main class="flex-1 relative">
        <div id="map"></div>
    </main>

    <script>
        let map;
        let trailLayer;

        // 1. Initialize Map immediately when the script runs
        function initMap() {
            map = L.map('map').setView([42.435, 18.755], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
            trailLayer = L.layerGroup().addTo(map);
        }

        // 2. Search Function
        async function performSearch() {
            const query = document.getElementById('search-input').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "Searching...";

            try {
                // Get Coordinates
                const geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`);
                const geoData = await geo.json();
                if (!geoData.length) throw new Error("Location not found");

                const { lat, lon } = geoData[0];
                map.setView([lat, lon], 13);

                // Get Trails
                const overpass = `[out:json][timeout:25];(relation["route"="hiking"](around:5000,${lat},${lon});way["highway"~"path|track"](around:5000,${lat},${lon}););out geom;`;
                const osm = await fetch(`https://overpass-api.de/api/interpreter`, { method: 'POST', body: overpass });
                const osmData = await osm.json();

                renderList(osmData.elements);
            } catch (err) {
                resDiv.innerHTML = `<p class="text-red-400 text-sm">Error: ${err.message}</p>`;
            }
        }

        // 3. Render List
        function renderList(trails) {
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "";
            trailLayer.clearLayers();

            if (trails.length === 0) resDiv.innerHTML = "No trails found.";

            trails.forEach(t => {
                const name = t.tags?.name || "Unnamed Path";
                const div = document.createElement('div');
                div.className = "p-3 bg-gray-800 rounded border border-gray-700 cursor-pointer hover:bg-gray-700 text-sm";
                div.innerHTML = name;
                div.onclick = () => drawTrail(t);
                resDiv.appendChild(div);
            });
        }

        // 4. Draw Trail
        function drawTrail(t) {
            trailLayer.clearLayers();
            const coords = t.geometry ? t.geometry.map(p => [p.lat, p.lon]) : [];
            if (coords.length) {
                const line = L.polyline(coords, { color: '#10b981', weight: 4 }).addTo(trailLayer);
                map.fitBounds(line.getBounds());
            }
        }

        // Start everything
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            document.getElementById('search-btn').onclick = performSearch;
        });
    </script>
</body>
</html>
